<div class="flex flex-col flex-auto sm:absolute sm:inset-0 sm:overflow-hidden bg-card dark:bg-transparent">
    <!-- Header -->
    <div class="relative flex flex-col px-6 py-8 border-b sm:flex-row flex-0 sm:items-center sm:justify-between md:px-8">
        <!-- Loader -->
        <div class="absolute inset-x-0 bottom-0" *ngIf="isLoading">
            <mat-progress-bar [mode]="'indeterminate'"></mat-progress-bar>
        </div>
        <!-- Title -->
        <div class="text-4xl font-extrabold tracking-tight">ประวัติการทำรายการ</div>
        <!-- Actions -->
        <div class="flex items-center mt-6 shrink-0 sm:mt-0 sm:ml-4"  [formGroup]="formData">
            <!-- <button (click)="pdf()" class="ml-1" mat-flat-button color="primary">
                <mat-icon svgIcon="heroicons_outline:document"></mat-icon>
            </button> -->
            <mat-form-field appearance="fill" class="w-64 pt-4 pl-2">
                <mat-date-range-input [rangePicker]="picker" (dateChange)="onDateChange($event)">
                    <input matStartDate placeholder="Start date" [formControlName]="'start_date'">
                    <input matEndDate placeholder="End date" [formControlName]="'end_date'">
                </mat-date-range-input>
                <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-date-range-picker #picker></mat-date-range-picker>
            </mat-form-field>
        </div>
    </div>
    <!-- Main -->
    <div class="flex flex-auto overflow-hidden">
        <!-- Products list -->
        <div class="flex flex-col flex-auto p-5 overflow-hidden overflow-x-auto sm:overflow-y-auto sm:relative">
            <!-- Products list -->
            <!-- <div class="pl-5 text-2xl font-bold tracking-tight">รายการ</div> -->
            <div class="flex flex-col flex-auto min-w-full p-5 overflow-x-auto sm:overflow-x-auto sm:overflow-y-auto">
                <table datatable [dtOptions]="dtOptions" class="table w-full row-border hover">
                    <thead>
                        <tr>
                            <th class="w-5*">ลำดับ</th>
                            <th class="">ชื่อ</th>
                            <th class="">รายละเอียด</th>
                            <th class="">ประเภท</th>
                            <th class="">วันที่</th>
                        </tr>
                    </thead>
                    <tbody *ngIf="dataRow?.length != 0">
                        <tr *ngFor="let item of dataRow;let i = index">

                            <td class="">{{ pages.begin + (i + 1) }}</td>
                            <td class="">{{ item.user.employees.first_name || '-' }}</td>
                            <td class="">{{ item.description }}</td>
                            <td class="">{{ item.type }}</td>
                            <td class="">{{ item.created_at | TH }}</td>
                        </tr>
                    </tbody>
                    <tbody *ngIf="dataRow?.length == 0">
                        <tr>
                            <td colspan="9" class="text-center no-data-available">
                                ไม่มีข้อมูล !
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
