<div class="flex flex-col flex-auto min-w-0">
    <div class="flex-auto p-2 md:p-4">
        <div class="grid gap-4 w-full sm:grid-cols-1 md:grid-cols-1">
            <form class="bg-card rounded-2xl md:shadow overflow-hidden p-4 mb-4 flex flex-col my-2"
                [formGroup]="formData">
                <span
                    class="text-xl md:text-xl font-bold tracking-tight leading-7 sm:leading-10 truncate text-gray-500">
                    แก้ไขสิทธิ์ของตำแหน่ง {{ data?.name }}
                </span>
                <div class="flex flex-col gap-2">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col"
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Menu
                                </th>
                                <th scope="col"
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    View
                                </th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200" formArrayName="menu">
                            <tr *ngFor="let menu of menuArray.controls; let i = index" [formGroupName]="i">
                                <td class="px-6 py-4 whitespace-nowrap">
                                    {{ menu.get('menu_name').value }}
                                </td>
                                <!-- <td class="px-6 py-4 whitespace-nowrap">
                                    <input type="checkbox" formControlName="view" />
                                </td> -->
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <label class="switch">
                                        <input type="checkbox" formControlName="view">
                                        <span class="slider"></span>
                                    </label>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="flex flex-row mt-2 justify-end">
                    <div class="text-3xl md:text-4xl font-extrabold tracking-tight leading-7 sm:leading-10 truncate">
                        <button class="px-6 ml-3 text-white" mat-flat-button (click)="backTo()">
                            ยกเลิก
                        </button>
                        <button class="px-6 ml-3" mat-flat-button [color]="'primary'"
                            (click)="Submit();">บันทึก</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
