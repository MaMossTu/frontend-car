<div class="flex flex-col flex-auto sm:absolute sm:inset-0 sm:overflow-hidden bg-card dark:bg-transparent">
    <div class="relative flex flex-col px-6 py-8 border-b sm:flex-row flex-0 sm:items-center sm:justify-between md:px-8">
        <div class="absolute inset-x-0 bottom-0" *ngIf="isLoading">
            <mat-progress-bar [mode]="'indeterminate'"></mat-progress-bar>
        </div>
        <div class="text-4xl font-extrabold tracking-tight">จังหวัด</div>
        <div class="flex items-center mt-6 shrink-0 sm:mt-0 sm:ml-4">
            <button class="sm:ml-4" mat-flat-button [color]="'primary'" (click)="openDialog()">
                <mat-icon [svgIcon]="'heroicons_outline:plus'"></mat-icon>
                <span class="ml-2 mr-1">เพิ่มข้อมูล</span>
            </button>
        </div>
    </div>
    <div class="flex flex-auto overflow-hidden">
        <div class="flex flex-col flex-auto min-w-full p-5 overflow-x-auto sm:overflow-y-auto">
            <table datatable [dtOptions]="dtOptions" class="table row-border hover w-100*">
                <thead>
                    <tr>
                        <th class="w-10*">ลำดับ</th>
                        <th>ชื่อจังหวัด (ไทย)</th>
                        <th>ชื่อจังหวัด (อังกฤษ)</th>
                        <th class="w-15* text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody *ngIf="dataRow?.length != 0">
                    <tr *ngFor="let item of dataRow; let i = index">
                        <td>{{ pages.begin + (i + 1) }}</td>
                        <td>{{ item.name_th ?? '-' }}</td>
                        <td>{{ item.name_en ?? '-' }}</td>
                        <td class="flex items-center justify-center w-auto space-x-1">
                            <button mat-button (click)="openDialog(item, $event)">
                                <mat-icon>edit</mat-icon>
                            </button>
                            <button mat-button (click)="delete(item.id)">
                                <mat-icon>delete</mat-icon>
                            </button>
                        </td>
                    </tr>
                </tbody>
                <tbody *ngIf="dataRow?.length == 0">
                    <tr>
                        <td colspan="4" class="text-center no-data-available">ไม่มีข้อมูล !</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<ng-template #Dialog>
    <div class="flex flex-col">
        <form [formGroup]="formData">
            <h2 mat-dialog-title *ngIf="!isEdit">เพิ่มจังหวัด</h2>
            <h2 mat-dialog-title *ngIf="isEdit">แก้ไขจังหวัด</h2>
            <mat-dialog-content>
                <div class="flex flex-col w-full mt-2 gap-2">
                    <mat-form-field appearance="outline" class="w-full">
                        <mat-label>ชื่อจังหวัด (ไทย)</mat-label>
                        <input matInput placeholder="เช่น กรุงเทพมหานคร" formControlName="name_th">
                    </mat-form-field>
                    <mat-form-field appearance="outline" class="w-full">
                        <mat-label>ชื่อจังหวัด (อังกฤษ)</mat-label>
                        <input matInput placeholder="e.g. Bangkok" formControlName="name_en">
                    </mat-form-field>
                </div>
            </mat-dialog-content>
            <mat-dialog-actions class="flex justify-end">
                <button mat-button (click)="closeDialog()" style="border-color: #1ca9df; color: #1ca9df;" class="border border-solid">ปิด</button>
                <button mat-button (click)="create()" *ngIf="!isEdit" style="background-color: #1ca9df;" class="text-white">บันทึก</button>
                <button mat-button (click)="update()" *ngIf="isEdit" style="background-color: #1ca9df;" class="text-white">บันทึก</button>
            </mat-dialog-actions>
        </form>
    </div>
</ng-template>
