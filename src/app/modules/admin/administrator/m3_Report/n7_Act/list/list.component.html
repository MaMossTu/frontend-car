<div class="sm:absolute sm:inset-0 flex flex-col flex-auto sm:overflow-hidden bg-card dark:bg-transparent">
    <!-- Header -->
    <div class="relative flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between py-8 px-6 md:px-8 border-b">
        <!-- Loader -->
        <div class="absolute inset-x-0 bottom-0" *ngIf="isLoading">
            <mat-progress-bar [mode]="'indeterminate'"></mat-progress-bar>
        </div>
        <!-- Title -->
        <div class="text-4xl font-extrabold tracking-tight">รายงานงาน พ.ร.บ.</div>
        <!-- Actions -->
        <div class="flex shrink-0 items-center mt-6 sm:mt-0 sm:ml-4"  [formGroup]="formData">
            <div class="flex space-x-2 reduceHeadPad">
                <mat-form-field appearance="fill" class="w-50">
                    <mat-select value="default" placeholder="เอกสาร">
                        <mat-option (click)="pdf()" class="" color="primary">
                            <mat-icon svgIcon="pdf-icon"></mat-icon>
                            <span class="ml-2 mr-1">X</span>
                        </mat-option>
                        <!-- <mat-option (click)="pdfMonth()" class="" color="primary">
                            <mat-icon svgIcon="pdf-icon"></mat-icon>
                            <span class="ml-2 mr-1">สรุปรายเดือน</span>
                        </mat-option>
                        <mat-option (click)="pdfDay()" class="" color="primary">
                            <mat-icon svgIcon="excel-icon"></mat-icon>
                            <span class="ml-2 mr-1">สรุปรายวัน</span>
                        </mat-option>
                        <mat-option (click)="pdfMonth()" class="" color="primary">
                            <mat-icon svgIcon="excel-icon"></mat-icon>
                            <span class="ml-2 mr-1">สรุปรายเดือน</span>
                        </mat-option> -->
                    </mat-select>
                </mat-form-field>
                <mat-form-field appearance="fill" class="w-64" [formGroup]="formData">
                    <mat-date-range-input [rangePicker]="picker">
                        <input
                            matStartDate
                            placeholder="Start date"
                            formControlName="startDate"
                            (dateChange)="onDateChange($event, 'startDate', formData)">
                        <input
                            matEndDate
                            placeholder="End date"
                            formControlName="endDate"
                            (dateChange)="onDateChange($event, 'endDate', formData)">
                    </mat-date-range-input>
                    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                    <mat-date-range-picker #picker></mat-date-range-picker>
                </mat-form-field>
            </div>
        </div>
    </div>

    <!-- search -->
    <!-- <div class="search-box relative flex flex-col flex-0 px-6 md:px-8 border-b mt-4">

    </div> -->

    <!-- Main -->
    <div class="flex flex-auto overflow-hidden">
        <!-- Products list -->
        <div class="flex flex-col flex-auto p-5 overflow-hidden sm:overflow-y-auto sm:relative overflow-x-auto">
            <div class="text-2xl font-bold tracking-tight pl-5">รายการ</div>
            <!-- Tabs -->
            <!-- Products list -->
            <div class="flex flex-col flex-auto p-5 overflow-x-auto sm:overflow-x-auto sm:overflow-y-auto min-w-full">
                <table datatable [dtOptions]="dtOptions" class="table row-border hover w-full">
                    <thead>
                        <tr>
                            <th class="w-5*">ลำดับ</th>
                            <th class="">ชื่อ</th>
                            <th class="">ป้ายทะเบียน</th>
                            <th class="">ประเภท</th>
                            <th class="">วันที่เรียกเก็บ</th>
                            <th class="">วันที่คุ้มครอง</th>
                        </tr>
                    </thead>
                    <tbody *ngIf="dataRow?.length != 0">
                        <tr *ngFor="
                                let item of dataRow;
                                let i = index
                            ">
                            <td style="width: 5%">
                                {{ pages.begin + (i + 1) }}
                            </td>
                            <td class="">{{ item.name }}</td>
                            <td class="">{{ item.license_plate }}</td>
                            <td class="">{{ item.vehicle_inspection_types_id }}</td>
                            <td class="">{{ item.notificate_insurance }}</td>
                            <td class="">{{ item.notificate_insurance_regis }}</td>

                            <!-- <td style="width: 15%"  >
                                <button mat-button    (click)="edit(item.id)">
                                    <mat-icon>edit</mat-icon>
                                </button>
                                <button mat-button   (click)="deleteCategory(item.id)">
                                    <mat-icon>delete</mat-icon>
                                </button>
                            </td> -->
                        </tr>
                    </tbody>
                    <tbody *ngIf="dataRow?.length == 0">
                        <tr>
                            <td colspan="9" class="no-data-available text-center">
                                ไม่มีข้อมูล !
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
