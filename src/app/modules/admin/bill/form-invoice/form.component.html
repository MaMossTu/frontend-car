<div class="flex flex-col flex-auto min-w-0">
    <div class="flex-auto p-2 md:p-4">
        <div class="grid gap-4 w-full sm:grid-cols-1 md:grid-cols-2">
            <form class="bg-card rounded-2xl md:shadow overflow-hidden p-4 mb-4 flex flex-col my-2" [formGroup]="form">
                <span class="text-xl md:text-xl font-bold tracking-tight leading-7 sm:leading-10 truncate text-gray-500"
                    *ngIf="!this.Id">
                    สร้างใบแจ้งหนี้
                </span>
                <span class="text-xl md:text-xl font-bold tracking-tight leading-7 sm:leading-10 truncate text-gray-500"
                    *ngIf="this.Id">
                    แก้ไขใบแจ้งหนี้ {{this.itemData?.no ?? '-'}}
                </span>
                <div class="flex flex-col md:flex-row gap-2">
                    <div class="flex flex-col w-full md:w-full">
                        <div class="flex md:flex-row mb-0">
                            <div class="w-full md:w-1/2 px-2 mb-2 md:mb-0">
                                <mat-form-field [ngClass]="formFieldHelpers" class="w-full">
                                    <mat-label>วันที่เอกสาร</mat-label>
                                    <input matInput [matDatepicker]="picker" placeholder="วันที่"
                                        [formControlName]="'date'">
                                    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                                    <mat-datepicker #picker></mat-datepicker>
                                </mat-form-field>
                            </div>
                            <div class="w-full md:w-1/2 px-2 mb-2 md:mb-0">
                                <mat-form-field [ngClass]="formFieldHelpers" class="w-full">
                                    <mat-label>วันที่ครบกำหนด</mat-label>
                                    <input matInput [matDatepicker]="validPicker" placeholder="วันที่"
                                        [formControlName]="'due_date'">
                                    <mat-datepicker-toggle matSuffix [for]="validPicker"></mat-datepicker-toggle>
                                    <mat-datepicker #validPicker></mat-datepicker>
                                </mat-form-field>
                            </div>
                        </div>
                        <div class="flex md:flex-row mb-0">
                            <div class="md:w-1/4 px-2 mb-2 md:mb-0">
                                <mat-form-field class="w-full" [ngClass]="formFieldHelpers">
                                    <mat-label>สาขา</mat-label>
                                    <mat-select [formControlName]="'branche_id'" placeholder="เลือกสาขา">
                                        <mat-option *ngFor="let item of branch" [value]="item.id">
                                            {{item.name}}
                                        </mat-option>
                                    </mat-select>
                                </mat-form-field>
                            </div>
                            <div class="md:w-3/4 px-2 mb-2 md:mb-0 w-full">
                                <mat-form-field class="w-full" [ngClass]="formFieldHelpers">
                                    <mat-label>หมายเหตุ</mat-label>
                                    <input matInput placeholder="หมายเหตุ" [formControlName]="'remark'">
                                </mat-form-field>
                            </div>
                        </div>
                        <div class="flex md:flex-row mb-0">
                            <div class="md:w-1/3 px-2 mb-2 md:mb-0">
                                <mat-form-field class="w-full" [ngClass]="formFieldHelpers">
                                    <mat-label>สถานะ หักภาษี ณ ที่จ่าย </mat-label>
                                    <mat-select [formControlName]="'withholding_tax'" placeholder="เลือกสาขา">
                                        <mat-option  [value]="'N'">
                                            ไม่หักภาษี ณ ที่จ่าย
                                        </mat-option>
                                        <mat-option  [value]="'Y'">
                                            หักภาษี ณ ที่จ่าย
                                        </mat-option>
                                    </mat-select>
                                </mat-form-field>
                            </div>
                            <div class="md:w-1/3 px-2 mb-2 md:mb-0">
                                <mat-form-field class="w-full" [ngClass]="formFieldHelpers">
                                    <mat-label>จำนวน % ที่หัก ณ ที่จ่าย</mat-label>
                                    <mat-select [formControlName]="'withholding_tax_percent'" placeholder="เลือกสาขา">
                                        <mat-option  [value]="0">
                                            0%
                                        </mat-option>
                                        <mat-option  [value]="1">
                                            1%
                                        </mat-option>
                                        <mat-option  [value]="2">
                                            2%
                                        </mat-option>
                                        <mat-option  [value]="3">
                                            3%
                                        </mat-option>
                                        <mat-option  [value]="4">
                                            4%
                                        </mat-option>
                                        <mat-option  [value]="5">
                                            5%
                                        </mat-option>
                                    </mat-select>
                                </mat-form-field>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flex flex-row mt-2 justify-center">
                    <div class="text-3xl md:text-4xl font-extrabold tracking-tight leading-7 sm:leading-10 truncate">
                        <button class="px-6 ml-3" mat-flat-button [color]="'primary'" (click)="Submit();">
                            บันทึก
                        </button>
                        <button class="px-6 ml-3 text-white" mat-flat-button [color]="'accent'" (click)="backTo()">
                            ยกเลิก
                        </button>
                    </div>
                </div>
            </form>
            <!-- {{this.form.value | json}} -->
            <div class="bg-card rounded-2xl md:shadow overflow-hidden p-4 mb-4 flex flex-col my-2">
                <span
                    class="text-xl md:text-xl font-bold tracking-tight leading-7 sm:leading-10 truncate text-gray-500">
                    เลขที่ใบเสนอราคา {{this.quotaNo ?? '-'}}
                </span>
                <div class="flex w-full justify-center pdf-viewer-container border-2 border-gray-900">
                    <pdf-viewer [src]="pdfSrc" [render-text]="true" [original-size]="false"
                        style="width: 90%; height: 100vh; "></pdf-viewer>
                </div>
            </div>
        </div>
    </div>
</div>
